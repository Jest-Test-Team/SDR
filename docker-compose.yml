version: '3.8'

services:
  control-plane:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.control-plane
    ports:
      - "9090:9090"
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - ZMQ_ENDPOINT=tcp://edge-gateway:5556
    depends_on:
      - edge-gateway
    volumes:
      - ./data:/data

  edge-gateway:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.edge-gateway
    devices:
      - "/dev/ttyUSB1:/dev/ttyUSB1"
    environment:
      - RUST_LOG=info
      - GW_PORT=/dev/ttyUSB1
      - GW_BAUD=921600
      - ZMQ_ENDPOINT=tcp://0.0.0.0:5556
      - HEALTH_PORT=8081
    ports:
      - "8081:8081"
    privileged: true

  hil-simulator:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.hil-simulator
    ports:
      - "8090:8090"
    environment:
      - RUST_LOG=info
      - HIL_PORT=8090
      - ZMQ_ENDPOINT=tcp://edge-gateway:5556

  hil-dashboard:
    build:
      context: ./web/hil-dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - HIL_API_URL=http://hil-simulator:8090
      - LIVE_CP_URL=http://control-plane:8080
      - LIVE_EDGE_URL=http://edge-gateway:8081
    depends_on:
      - hil-simulator
      - control-plane

  gnuradio-sim:
    build:
      context: ./dsp-core
      dockerfile: docker/Dockerfile.gnuradio
    network_mode: host
    profiles: ["sim"]