version: '3.8'

services:
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    ports:
      - "9090:9090"  # Prometheus metrics
      - "8080:8080"  # Health check
    environment:
      - RUST_LOG=info
      - ZMQ_ENDPOINT=tcp://edge-gateway:5556
    depends_on:
      - edge-gateway
    volumes:
      - ./data:/data

  edge-gateway:
    build:
      context: .
      dockerfile: Dockerfile.edge-gateway
    devices:
      - "/dev/ttyUSB1:/dev/ttyUSB1"
    environment:
      - RUST_LOG=info
      - GW_PORT=/dev/ttyUSB1
      - GW_BAUD=921600
      - ZMQ_ENDPOINT=tcp://0.0.0.0:5556
      - HEALTH_PORT=8081
      - METRICS_PORT=9091
    ports:
      - "8081:8081"
      - "9091:9091"
    privileged: true