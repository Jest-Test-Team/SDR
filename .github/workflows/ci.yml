name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libzmq3-dev libudev-dev pkg-config
      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --exclude esp32-tx-node --exclude esp32s3-gateway --all-targets
      - name: cargo check
        run: cargo check --workspace --exclude esp32-tx-node --exclude esp32s3-gateway --all-targets

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libzmq3-dev libudev-dev pkg-config
      - name: cargo test (lib only)
        run: cargo test --workspace --exclude esp32-tx-node --exclude esp32s3-gateway --lib
      - name: Integration tests
        run: cargo test -p control-plane --test sim_pipeline
      - name: HIL simulator tests
        run: cargo test -p hil-simulator --lib

  build-firmware:
    name: Build Firmware (Cross-compile)
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RUSTFLAGS: ""
      RUST_MIN_STACK: "16777216"
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build python3 python3-venv git wget libssl-dev libusb-1.0-0-dev pkg-config
      - name: Install Rust for Xtensa (espup)
        uses: esp-rs/xtensa-toolchain@v1.7
        with:
          default: true
          buildtargets: esp32,esp32s3
          ldproxy: true
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build esp32-tx-node
        run: |
          cargo +esp build --release -p esp32-tx-node \
            --config 'build.target="xtensa-esp32-espidf"' \
            --config 'unstable.build-std=["std","panic_abort"]' \
            --config 'target."cfg(target_os = \"espidf\")".linker="ldproxy"' \
            --config 'target."cfg(target_os = \"espidf\")".rustflags=["--cfg","espidf_time64"]' \
            --config 'env.ESP_IDF_TOOLS_INSTALL_DIR="workspace"' \
            --config 'env.MCU="esp32"' \
            --config 'env.ESP_IDF_SYS_ROOT_CRATE="esp32-tx-node"'
      - name: Build esp32s3-gateway
        run: |
          cargo +esp build --release -p esp32s3-gateway \
            --config 'build.target="xtensa-esp32s3-espidf"' \
            --config 'unstable.build-std=["std","panic_abort"]' \
            --config 'target."cfg(target_os = \"espidf\")".linker="ldproxy"' \
            --config 'target."cfg(target_os = \"espidf\")".rustflags=["--cfg","espidf_time64"]' \
            --config 'env.ESP_IDF_TOOLS_INSTALL_DIR="workspace"' \
            --config 'env.MCU="esp32s3"' \
            --config 'env.ESP_IDF_SYS_ROOT_CRATE="esp32s3-gateway"' \
            --config 'env.ESP_IDF_SDKCONFIG_DEFAULTS="firmware/esp32s3-gateway/sdkconfig.defaults"'
