name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libzmq3-dev pkg-config
      - name: cargo fmt
        run: cargo fmt --check --workspace
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets
      - name: cargo check
        run: cargo check --workspace --all-targets

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libzmq3-dev pkg-config
      - name: cargo test (lib only)
        run: cargo test --workspace --lib
      - name: Integration tests
        run: cargo test -p control-plane --test sim_pipeline

  build-firmware:
    name: Build Firmware (Cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: xtensa-esp32-none-elf, xtensa-esp32s3-none-elf
      - name: Install espup/espflash
        run: |
          cargo install espup cargo-espflash --locked
          espup install --toolchain-version 0.49.0
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build esp32-tx-node
        run: cargo build --release -p esp32-tx-node
      - name: Build esp32s3-gateway
        run: cargo build --release -p esp32s3-gateway